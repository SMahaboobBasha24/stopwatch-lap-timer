<!DOCTYPE html>
<html>
<head>
<title>Stopwatch</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
text-align:center;
width:350px;
}

#time{
font-size:40px;
margin:20px 0;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.start{background:#22c55e;color:white;}
.pause{background:#f59e0b;color:white;}
.reset{background:#ef4444;color:white;}
.lap{background:#3b82f6;color:white;}

ul{
list-style:none;
padding:0;
margin-top:20px;
max-height:150px;
overflow:auto;
}

li{
background:#334155;
padding:8px;
margin-top:5px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>⏱️ Stopwatch</h2>

<div id="time">00:00:00</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="reset" onclick="reset()">Reset</button>
<button class="lap" onclick="lap()">Lap</button>

<ul id="laps"></ul>

</div>

<script>

let seconds = 0
let minutes = 0
let hours = 0
let timer = null

function updateDisplay(){

let h = hours < 10 ? "0"+hours : hours
let m = minutes < 10 ? "0"+minutes : minutes
let s = seconds < 10 ? "0"+seconds : seconds

document.getElementById("time").innerText = h + ":" + m + ":" + s

}

function start(){

if(timer) return

timer = setInterval(function(){

seconds++

if(seconds == 60){
seconds = 0
minutes++
}

if(minutes == 60){
minutes = 0
hours++
}

updateDisplay()

},1000)

}

function pause(){

clearInterval(timer)
timer = null

}

function reset(){

clearInterval(timer)
timer = null

seconds = 0
minutes = 0
hours = 0

updateDisplay()

document.getElementById("laps").innerHTML = ""

}

function lap(){

let lapTime = document.getElementById("time").innerText

let li = document.createElement("li")
li.innerText = lapTime

document.getElementById("laps").appendChild(li)

}

updateDisplay()

</script>

</body>
</html>
